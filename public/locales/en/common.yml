selectedWork:
  title: "Selected Work"
  intro: "Selected examples of websites and tools I can build for small businesses — from simple local business websites to more advanced internal workflows."
  actions:
    viewDetails: "View details"
    viewPublicWebsite: "View Website"
    viewBackOffice: "View Back-Office"
    openCrmDemo: "Open CRM Demo"
  caseStudy:
    eyebrow: "Case study"
  projects:
    scooter:
      title: "Scooter Rental"
      type: "Full-stack platform"
      description: "A full-stack rental platform for a scooter business, pairing a conversion-focused customer website with an internal dashboard for bookings, fleet availability, maintenance tracking, and staff permissions."
      tags:
        - "Website"
        - "Booking Flow"
        - "Fleet Calendar"
        - "Internal Tool"
      caseStudy:
        summary: "Scooter Rental brings together two connected experiences: a polished public website that helps customers browse models and request bookings, and a practical back-office that keeps daily operations organized."
        sections:
          publicSite:
            title: "Customer website"
            description: "A mobile-friendly rental website with a strong landing page, bike catalogue, filters, model pages, date selection, availability cues, pricing estimates and WhatsApp-based booking requests."
            imageAlt: "Scooter Rental customer website interface"
          backOffice:
            title: "Back-office"
            description: "An operations dashboard for fleet planning, booking timelines, vehicle inventory, maintenance deadlines, insurance and tax tracking, users and permission controls."
            imageAlt: "Scooter Rental back-office dashboard interface"
    siamEstate:
      title: "Siam Estate"
      type: "Real estate platform"
      description: "A real estate platform for property listings in Thailand, pairing a polished customer website for browsing homes, locations and articles with a back-office for managing listings, inquiries, photos and content."
      tags:
        - "Real estate"
        - "Property search"
        - "Listings CMS"
        - "Back-office"
      caseStudy:
        summary: "Siam Estate connects a premium real estate website with an operational back-office, so properties, residences, owners, inquiries and editorial content can be managed from one place."
        sections:
          publicSite:
            title: "Customer website"
            description: "A public website for browsing Thai properties by location and type, reading market articles, exploring listing details and sending inquiries from a polished, mobile-friendly experience."
            imageAlt: "Siam Estate customer website interface"
          backOffice:
            title: "Back-office"
            description: "An administration workspace for listings, residences, owners, locations, blog content, inquiries and photo management, with dashboards that keep the portfolio easy to maintain."
            imageAlt: "Siam Estate back-office dashboard interface"
    prospectingCrm:
      title: "Prospecting CRM"
      type: "Internal sales tool"
      description: "A prospecting CRM built to import lead lists from CSV files, organize prospects, schedule callbacks and appointments, track pipeline activity, and prepare outreach with reusable email templates."
      tags:
        - "CSV import"
        - "CRM"
        - "Calendar"
        - "Email templates"
      caseStudy:
        summary: "Prospecting CRM is built around the day-to-day workflow of freelance outreach: importing prospects, qualifying leads, planning follow-ups and keeping sales activity visible."
        sections:
          crmWorkflow:
            title: "Prospecting workflow"
            description: "A focused CRM workspace with prospect tables, filters, status tracking, appointments, callbacks, calendar views, client records, reusable email templates and quick access to lead details."
            imageAlt: "Prospecting CRM dashboard and mobile calendar interface"

