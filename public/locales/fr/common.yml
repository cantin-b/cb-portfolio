services:
  title: "services"
  intro: "Du simple site internet à l’outil interne sur mesure, je vous aide à concevoir, développer et maintenir un logiciel adapté à votre façon de travailler."
  items:
    - "Sites internet et landing pages optimisés SEO, développés avec React ou Next.js"
    - "Outils internes et fonctionnalités back-office pour les opérations quotidiennes"
    - "Workflows de type CRM pour gérer clients, demandes, réservations ou données métier"
    - "Intégrations API avec services tiers, formulaires, tableaux de bord ou outils d’administration"
    - "Déploiement et maintenance sur serveurs Linux avec NGINX, PM2 ou Docker"

