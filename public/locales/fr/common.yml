about:
  title: "ce que je fais"
  description: >
    J’aide les petites et moyennes entreprises à créer des outils concrets qui facilitent le quotidien : un site internet qui génère des demandes, ou une application sur mesure qui colle à votre façon de travailler.
    Du <b>site vitrine</b> au <b>logiciel personnalisé</b>, je conçois, développe et déploie des solutions en <b>React/Next.js</b> et <b>Node.js</b>.
    Cela peut inclure des formulaires de demande ou de devis, des parcours de réservation, des tableaux de bord, des <b>CRM / back-offices</b>, des intégrations API ou de petites automatisations qui réduisent le travail manuel.
